# =============================================================================
# Musically — Nginx Development Configuration
# =============================================================================
# Used in local dev (docker-compose.override.yml) where nginx runs in its own
# container separate from the API. Proxies /api to the api container (api:8000)
# instead of localhost:8000.
#
# Static assets:   /assets/*  → cached 1 year (hashed filenames)
# HTML (SPA):      /*          → no-cache, fallback to index.html
# API:             /api/*      → proxy to api:8000
# OpenAPI docs:    /docs, /redoc, /openapi.json → proxy to api:8000
# =============================================================================

upstream api_backend {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # Maximum upload size for any file uploads
    client_max_body_size 100M;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -----------------------------------------------------------------------
    # Gzip compression for text-based assets
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # -----------------------------------------------------------------------
    # API proxy — all /api/* requests go to FastAPI
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # -----------------------------------------------------------------------
    # OpenAPI / Swagger docs proxy
    # -----------------------------------------------------------------------
    location /docs {
        proxy_pass http://api_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://api_backend/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://api_backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Static assets — long cache (filenames are content-hashed)
    # -----------------------------------------------------------------------
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # SPA fallback — serve index.html for all non-file routes
    # -----------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # HTML should never be cached (so users always get latest app version)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # -----------------------------------------------------------------------
    # Deny access to hidden files
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
