# =============================================================================
# Musically — Docker Build & Push CI/CD Pipeline
# =============================================================================
# Builds and pushes a single multi-arch Docker image to GitHub Container
# Registry. The same image is used for all services (api, worker, beat).
#
# Triggers:
#   - Push to master branch → tag as :latest
#   - Push of version tags (v*) → tag with the version number
#
# Path filtering (main branch only — tags always build):
#   Builds when backend/, frontend/, nginx/, root Dockerfile, or workflow
#   files change.
#
# Image:
#   - ghcr.io/maxschramp/musically  (nginx + FastAPI + Celery, single image)
# =============================================================================

name: Docker Build & Push

on:
  push:
    branches:
      - master
    tags:
      - "v*"

# Cancel in-progress runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


permissions:
  contents: read
  packages: write

jobs:
  # ===========================================================================
  # Single Image — nginx + FastAPI + Celery (multi-stage build)
  # ===========================================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    # Build on every push to main or version tag
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/maxschramp/musically
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
