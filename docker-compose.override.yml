# =============================================================================
# Musically — Local Development Overrides
# =============================================================================
# This file is automatically merged with docker-compose.yml by Docker Compose.
# It overrides production settings for local dev:
#   - SQLite instead of PostgreSQL (simpler, no DB container needed)
#   - Hot-reload on backend source code
#   - Vite dev server for frontend with HMR
#   - Nginx proxies /api to backend and serves static SPA
#
# All services build from the single root Dockerfile.
#
# Usage:
#   docker compose up -d
#   # (docker-compose.override.yml is automatically applied)
#
# Or explicitly:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx — dev mode: proxy /api to FastAPI, serve React SPA
  # ---------------------------------------------------------------------------
  # In dev, nginx runs in its own container (not supervised with uvicorn).
  # Uses a dev-specific config that proxies to the api container (api:8000)
  # instead of localhost:8000.
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musically-nginx
    command: nginx -g "daemon off;"
    ports:
      - "${APP_PORT:-8080}:80"
      - "${APP_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started

  # ---------------------------------------------------------------------------
  # API — hot-reload with uvicorn --reload (no supervisord in dev)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/musically.db
      - REDIS_URL=redis://redis:6379/0
      - MUSIC_DIR=/music
      - DOWNLOADS_DIR=/downloads
      - CONFIG_DIR=/config
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - SECRET_KEY=${SECRET_KEY}
      - QOBUZ_EMAIL=${QOBUZ_EMAIL}
      - QOBUZ_PASSWORD=${QOBUZ_PASSWORD}
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET}
      - LASTFM_USERNAME=${LASTFM_USERNAME}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - ./backend:/app:ro                # Mount source for hot-reload
      - ./backend/data:/app/data         # SQLite DB (writable, separate from :ro mount)
      - ./data/downloads:/downloads      # Temp Qobuz download staging
      - ./config:/config                 # beets config + app settings
      - ./music:/music                   # Local music dir (relative path for dev)
    depends_on:
      redis:
        condition: service_started
    # No db dependency in dev — SQLite is file-based

  # ---------------------------------------------------------------------------
  # Celery Worker — dev mode with SQLite
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=debug --concurrency=2
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/musically.db
      - REDIS_URL=redis://redis:6379/0
      - MUSIC_DIR=/music
      - DOWNLOADS_DIR=/downloads
      - CONFIG_DIR=/config
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - SECRET_KEY=${SECRET_KEY}
      - QOBUZ_EMAIL=${QOBUZ_EMAIL}
      - QOBUZ_PASSWORD=${QOBUZ_PASSWORD}
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET}
      - LASTFM_USERNAME=${LASTFM_USERNAME}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - ./backend:/app:ro
      - ./backend/data:/app/data         # SQLite DB (writable, separate from :ro mount)
      - ./data/downloads:/downloads
      - ./config:/config
      - ./music:/music
    depends_on:
      redis:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Celery Beat — dev mode with SQLite
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=debug --schedule=/app/data/celerybeat-schedule
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/musically.db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - QOBUZ_EMAIL=${QOBUZ_EMAIL}
      - QOBUZ_PASSWORD=${QOBUZ_PASSWORD}
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET}
      - LASTFM_USERNAME=${LASTFM_USERNAME}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - ./backend:/app:ro
      - ./backend/data:/app/data         # SQLite DB (writable, separate from :ro mount)
    depends_on:
      redis:
        condition: service_started

  # ---------------------------------------------------------------------------
  # PostgreSQL — runs but unused in dev (SQLite used instead per DATABASE_URL)
  # ---------------------------------------------------------------------------
  db:
    ports:
      - "5432:5432"

  # ---------------------------------------------------------------------------
  # Frontend — Vite dev server with HMR
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: musically-frontend-dev
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_API_BASE_URL=http://localhost:${APP_PORT:-8080}/api
    volumes:
      - ./frontend/src:/app/src:ro     # Mount source for HMR
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
    ports:
      - "5173:5173"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — same as production but with healthcheck and exposed port
  # ---------------------------------------------------------------------------
  redis:
    ports:
      - "6379:6379"                     # Expose for local debugging
