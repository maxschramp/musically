<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Qobuz Downloader — Queue</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        background: #1a1a1a;
        color: #eee;
        padding: 16px;
        min-width: 380px;
      }
      h1 { font-size: 15px; margin-bottom: 4px; }
      h2 { font-size: 12px; color: #888; font-weight: 400; margin-bottom: 12px; }
      #progress-bar {
        height: 4px;
        background: #333;
        border-radius: 2px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      #progress-fill {
        height: 100%;
        background: #0a84ff;
        transition: width 0.3s;
        width: 0%;
      }
      #summary {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 12px;
      }
      #list {
        list-style: none;
        max-height: 400px;
        overflow-y: auto;
      }
      #list li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 12px;
        margin-bottom: 2px;
      }
      #list li:nth-child(odd) { background: #222; }
      #list li .status {
        flex: 0 0 16px;
        text-align: center;
        font-size: 12px;
      }
      #list li .title { flex: 1; }
      #list li .performer { color: #888; font-size: 11px; }
      #list li.done { color: #8f8; }
      #list li.error { color: #f88; }
      #list li.downloading { color: #8cf; background: #1a2a3a; }
      #list li.queued { color: #aaa; }
      #empty {
        text-align: center;
        color: #666;
        padding: 40px 0;
        font-size: 13px;
      }
      button {
        padding: 6px 14px;
        font-size: 12px;
        background: #2a2a2a;
        color: #eee;
        border: 1px solid #444;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 12px;
      }
      button:hover { background: #333; }
      button.primary { background: #0a84ff; border-color: #0a84ff; }
      button.primary:hover { background: #006fe6; }
    </style>
  </head>
  <body>
    <h1 id="album-title">Qobuz Download Queue</h1>
    <h2 id="album-subtitle">Waiting for downloads…</h2>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="summary"></div>
    <ul id="list"></ul>
    <div id="empty" style="display:none">No active downloads.<br><small>Open a Qobuz album and click "Download album" to queue tracks.</small></div>
    <div style="display:flex; gap:8px; margin-top:12px">
      <button id="btn-clear" class="primary">Clear completed</button>
      <button id="btn-close">Close</button>
    </div>
    <script src="queue.js"></script>
  </body>
</html>
