<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Qobuz Downloader</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        margin: 0;
        padding: 12px;
        width: 280px;
        background: #1a1a1a;
        color: #eee;
      }
      h1 { font-size: 14px; margin: 0 0 8px 0; }
      label { display: block; margin: 8px 0 4px; color: #aaa; }
      select, button {
        width: 100%;
        padding: 6px 8px;
        font-size: 13px;
        background: #2a2a2a;
        color: #eee;
        border: 1px solid #444;
        border-radius: 4px;
        box-sizing: border-box;
      }
      input[type="text"] {
        width: 100%;
        padding: 6px 8px;
        font-size: 13px;
        background: #2a2a2a;
        color: #eee;
        border: 1px solid #444;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        margin-top: 10px;
        cursor: pointer;
        background: #0a84ff;
        border-color: #0a84ff;
        font-weight: 600;
      }
      button:hover:not(:disabled) { background: #006fe6; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #target { margin: 4px 0 0 0; color: #9ad; font-size: 12px; }
      #status {
        margin-top: 10px;
        padding: 8px;
        background: #2a2a2a;
        border-radius: 4px;
        min-height: 1em;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }
      #status.error { background: #4a1f1f; color: #ffb4b4; }
      #status.ok    { background: #1f3a1f; color: #b4ffb4; }
      a { color: #0a84ff; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Qobuz Downloader</h1>
    <div id="target">Detecting…</div>

    <label for="quality">Quality</label>
    <select id="quality">
      <option value="flac">FLAC (best available)</option>
      <option value="mp3">MP3 320 kbps</option>
    </select>

    <label for="subfolder">Subfolder (under Downloads)</label>
    <input id="subfolder" type="text" placeholder="e.g. Music/Qobuz" autocomplete="off" />

    <button id="dl" disabled>Download</button>
    <button id="viewQueue" style="margin-top:6px;background:#2a2a2a;border-color:#444;font-weight:400;display:none">View queue</button>
    <div id="status"></div>
    <p style="margin: 10px 0 0 0;">
      <a href="#" id="opts">Open options</a>
    </p>
    <script src="popup.js"></script>
  </body>
</html>
