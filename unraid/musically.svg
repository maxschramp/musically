<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <!-- Background: deep green rounded rect -->
  <rect width="180" height="180" rx="24" fill="#003c33"/>

  <!-- Music note (beam + stems + noteheads) in coral -->
  <g fill="#ff7759">
    <!-- First note (left) -->
    <ellipse cx="52" cy="118" rx="14" ry="10" transform="rotate(-20, 52, 118)"/>
    <rect x="62" y="58" width="5" height="62" rx="2"/>

    <!-- Second note (right, connected by beam) -->
    <ellipse cx="108" cy="108" rx="14" ry="10" transform="rotate(-20, 108, 108)"/>
    <rect x="118" y="48" width="5" height="62" rx="2"/>

    <!-- Beam connecting the two stems -->
    <rect x="62" y="48" width="61" height="8" rx="2"/>
  </g>

  <!-- "M" text at bottom -->
  <text x="90" y="160" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#ff7759" letter-spacing="2">MUSICALLY</text>
</svg>
